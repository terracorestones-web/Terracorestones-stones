<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marble — Terracore Stones</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --sand:#c8a882; --cream:#f5f0e8; --stone:#1e1a16; --deep:#130f0c; }
    html { scroll-behavior:smooth; }
    body { font-family:'Jost',sans-serif; background:var(--stone); color:var(--cream); overflow-x:hidden; }
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity:.4;
    }
    .gnav {
      position:sticky; top:0; z-index:50;
      display:flex; align-items:center; justify-content:space-between;
      padding:1.2rem 3.5rem;
      background:rgba(19,15,12,.92); backdrop-filter:blur(6px);
      border-bottom:1px solid rgba(200,168,130,.08);
    }
    .gnav-logo img { height:46px; width:auto; display:block; }
    .gback { color:var(--cream); text-decoration:none; font-size:.66rem; letter-spacing:.22em; font-weight:300; opacity:.8; transition:opacity .2s,color .2s; }
    .gback:hover { opacity:1; color:var(--sand); }
    .ghead { position:relative; z-index:1; text-align:center; padding:5rem 2rem 2.5rem; }
    .ghead .lbl { font-size:.58rem; letter-spacing:.45em; color:var(--sand); font-weight:400; margin-bottom:1rem; }
    .ghead h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(2.2rem,5vw,3.6rem); letter-spacing:.06em; }
    .ghead .rule { width:46px; height:1px; background:var(--sand); margin:1.6rem auto 0; }
    .gallery { position:relative; z-index:1; padding:2rem 2rem 6rem; max-width:1280px; margin:0 auto; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.1rem; }
    .shot { position:relative; overflow:hidden; cursor:pointer; border:1px solid rgba(200,168,130,.08); background:#13100d; }
    .shot img { width:100%; height:260px; object-fit:cover; display:block; transition:transform .6s cubic-bezier(.25,.46,.45,.94); }
    .shot:hover img { transform:scale(1.05); }
    .shot::after { content:''; position:absolute; inset:0; background:rgba(19,10,6,0); transition:background .3s; }
    .shot:hover::after { background:rgba(19,10,6,.15); }
    .lb { position:fixed; inset:0; z-index:100; background:rgba(8,6,4,.95); display:none; align-items:center; justify-content:center; padding:2rem; }
    .lb.open { display:flex; }
    .lb img { max-width:92vw; max-height:88vh; object-fit:contain; box-shadow:0 20px 60px rgba(0,0,0,.6); }
    .lb-close { position:absolute; top:1.4rem; right:2rem; background:none; border:none; color:var(--cream); font-size:2rem; cursor:pointer; opacity:.7; transition:opacity .2s; line-height:1; }
    .lb-close:hover { opacity:1; }
    .lb-nav { position:absolute; top:50%; transform:translateY(-50%); background:none; border:1px solid rgba(200,168,130,.3); color:var(--cream); width:48px; height:48px; border-radius:50%; font-size:1.4rem; cursor:pointer; opacity:.7; transition:opacity .2s,background .2s; display:flex; align-items:center; justify-content:center; }
    .lb-nav:hover { opacity:1; background:rgba(200,168,130,.12); }
    .lb-prev { left:1.5rem; } .lb-next { right:1.5rem; }
    .lb-count { position:absolute; bottom:1.6rem; left:50%; transform:translateX(-50%); font-size:.62rem; letter-spacing:.25em; color:var(--sand); opacity:.8; }
    footer { position:relative; z-index:1; background:#0a0806; padding:2rem 4rem; text-align:center; border-top:1px solid rgba(200,168,130,.08); }
    footer a { color:var(--sand); text-decoration:none; font-size:.66rem; letter-spacing:.22em; opacity:.85; }
    footer a:hover { opacity:1; }
    footer p { font-size:.58rem; letter-spacing:.18em; opacity:.38; margin-top:1rem; }
    @media(max-width:900px){
      .gnav { padding:1rem 1.6rem; }
      .grid { grid-template-columns:repeat(2,1fr); gap:.8rem; }
      .shot img { height:200px; }
      .lb-prev { left:.6rem; } .lb-next { right:.6rem; }
    }
    @media(max-width:560px){
      .grid { grid-template-columns:1fr; }
      .shot img { height:280px; }
    }
  </style>
</head>
<body>

  <div class="gnav">
    <a class="gnav-logo" href="index.html"><img src="logo.png" alt="Terracore Stones"/></a>
    <a class="gback" href="index.html#portfolio">&#8592; BACK TO PORTFOLIO</a>
  </div>

  <div class="ghead">
    <p class="lbl">SELECTED WORK</p>
    <h1>Marble</h1>
    <div class="rule"></div>
  </div>

  <div class="gallery">
    <div class="grid" id="grid"></div>
  </div>

  <footer>
    <a href="index.html#contact">GET IN TOUCH &#8594;</a>
    <p>&copy; 2026 Terracore Stones &middot; Natural Stones for Interior Design &amp; Architecture</p>
  </footer>

  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose">&times;</button>
    <button class="lb-nav lb-prev" id="lbPrev">&#8249;</button>
    <img id="lbImg" src="" alt="Marble"/>
    <button class="lb-nav lb-next" id="lbNext">&#8250;</button>
    <div class="lb-count" id="lbCount"></div>
  </div>

  <script>
    const TOTAL = 6;
    const PREFIX = 'marble-';
    const EXT = '.jpg';

    const grid = document.getElementById('grid');
    const photos = [];
    for (let i = 1; i <= TOTAL; i++) {
      const src = PREFIX + i + EXT;
      photos.push(src);
      const cell = document.createElement('div');
      cell.className = 'shot';
      cell.innerHTML = '<img src="' + src + '" alt="Marble ' + i + '" loading="lazy"/>';
      cell.addEventListener('click', () => openLb(i - 1));
      grid.appendChild(cell);
    }

    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lbImg');
    const lbCount = document.getElementById('lbCount');
    let current = 0;

    function openLb(i) { current = i; show(); lb.classList.add('open'); }
    function closeLb() { lb.classList.remove('open'); }
    function show() {
      lbImg.src = photos[current];
      lbCount.textContent = (current + 1) + ' / ' + TOTAL;
    }
    function next() { current = (current + 1) % TOTAL; show(); }
    function prev() { current = (current - 1 + TOTAL) % TOTAL; show(); }

    document.getElementById('lbClose').addEventListener('click', closeLb);
    document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); next(); });
    document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); prev(); });
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLb();
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
    });
  </script>
</body>
</html>
