<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terracore Stones — Natural Stone for Interior Design & Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sand:  #c8a882; --rust: #9e5a34; --cream: #f5f0e8;
      --stone: #1e1a16; --mid: #7a6654;  --brass: #b8913a;
      --deep:  #130f0c;
    }
    html { scroll-behavior: smooth; }
    body { font-family:'Jost',sans-serif; background:var(--stone); color:var(--cream); overflow-x:hidden; }
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity:.4;
    }

    /* ─── NAV ─── */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:200;
      display:flex; align-items:center; justify-content:space-between;
      padding:1.2rem 3.5rem;
      background:linear-gradient(to bottom,rgba(19,15,12,.96) 0%,rgba(19,15,12,0) 100%);
      transition:background .4s;
    }
    nav.scrolled { background:rgba(19,15,12,.97); border-bottom:1px solid rgba(200,168,130,.08); }

    /* ─── LOGO ─── */
    .logo-wrap { display:flex; align-items:center; text-decoration:none; }
    .nav-logo-img { height:82px; width:auto; display:block; }

    .nav-links { display:flex; gap:2.4rem; list-style:none; }
    .nav-links a { color:var(--cream); text-decoration:none; font-size:.68rem; letter-spacing:.22em; font-weight:300; opacity:.75; transition:opacity .2s,color .2s; }
    .nav-links a:hover { opacity:1; color:var(--sand); }

    /* ─── HERO ─── */
    .hero {
      position:relative; height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; overflow:hidden;
    }
    .hero-bg {
      position:absolute; inset:0;
      background:linear-gradient(160deg,#6b3a24 0%,#3d2416 28%,#1a1210 58%,#0d1a1a 100%);
    }
    .hero-bg::after {
      content:''; position:absolute; inset:0;
      background:repeating-linear-gradient(-18deg,transparent 0,rgba(200,168,130,.035) 1px,transparent 2px,transparent 90px);
    }
    .hero-overlay { position:absolute; inset:0; background:radial-gradient(ellipse at center,rgba(0,0,0,0) 25%,rgba(0,0,0,.6) 100%); }
    .hero-content { position:relative; z-index:2; }

    /* Hero logo image */
    .hero-logo-img { width:clamp(300px,42vw,460px); height:auto; display:block; margin:0 auto; animation:fadeUp .9s ease both; }

    .hero-tagline { font-size:.85rem; letter-spacing:.1em; font-weight:200; max-width:440px; margin:.4rem auto 0; line-height:2.1; opacity:.72; animation:fadeUp .9s .32s ease both; }
    .hero-cta { display:inline-block; margin-top:1.8rem; border:1px solid var(--sand); color:var(--sand); padding:.82rem 2.6rem; font-size:.65rem; letter-spacing:.32em; text-decoration:none; font-weight:300; transition:background .3s,color .3s; animation:fadeUp .9s .44s ease both; }
    .hero-cta:hover { background:var(--sand); color:var(--stone); }
    .hero-scroll { position:absolute; bottom:2.2rem; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:.5rem; opacity:.45; animation:fadeUp .9s .6s ease both; }
    .hero-scroll span { font-size:.55rem; letter-spacing:.32em; }
    .scroll-bar { width:1px; height:38px; background:var(--sand); animation:scrollPulse 2.2s infinite; }

    /* ─── SHARED ─── */
    section { position:relative; z-index:1; }
    .pad { padding:7rem 4rem; }
    .s-label { font-size:.58rem; letter-spacing:.45em; color:var(--sand); font-weight:400; margin-bottom:.9rem; }
    .s-title { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(1.9rem,3.8vw,3rem); line-height:1.18; letter-spacing:.05em; }
    .divider { width:46px; height:1px; background:var(--sand); margin:1.5rem 0; }
    .divider.c { margin:1.5rem auto; }

    /* ─── ABOUT ─── */
    .about { background:#191410; display:grid; grid-template-columns:1fr 1fr; gap:6rem; align-items:center; }
    .about-text p { font-size:.86rem; line-height:2.15; opacity:.76; font-weight:200; }
    .about-text p+p { margin-top:1.1rem; }
    .about-stats { display:grid; grid-template-columns:1fr 1fr; gap:1.8rem; margin-top:2.8rem; }
    .stat { border-left:1px solid rgba(200,168,130,.28); padding-left:1.1rem; }
    .stat .num { font-family:'Cormorant Garamond',serif; font-size:2.3rem; font-weight:300; color:var(--sand); }
    .stat .lbl { font-size:.58rem; letter-spacing:.2em; opacity:.55; margin-top:.25rem; }
    .about-visual { position:relative; height:480px; }
    .ab-card { position:absolute; border:1px solid rgba(200,168,130,.22); }
    .ab-card:nth-child(1) { inset:0 70px 90px 0; background:rgba(30,20,14,.6); }
    .ab-card:nth-child(2) { top:90px; left:70px; right:0; bottom:0; background:rgba(158,90,52,.1); border-color:rgba(200,168,130,.38); padding:2rem; display:flex; align-items:center; }
    .ab-quote { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-style:italic; font-weight:300; line-height:1.75; }

    /* ─── PORTFOLIO ─── */
    .portfolio { background:var(--stone); }
    .port-header { text-align:center; padding:7rem 4rem 3rem; }
    .port-grid { padding:0 2rem 7rem; }
    .masonry { column-count:3; column-gap:1.1rem; }

    /* HORIZONTAL SCROLL WORKS */
    .works-wrap { position:relative; max-width:1240px; margin:0 auto; }
    .works-scroll {
      display:flex; gap:1.6rem; overflow-x:auto;
      scroll-snap-type:x mandatory; scroll-behavior:smooth;
      padding:0 2rem 1.6rem; -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    .works-scroll::-webkit-scrollbar { display:none; }
    .work-card { flex:0 0 auto; width:min(360px,78vw); scroll-snap-align:start; text-decoration:none; color:var(--cream); display:block; }
    .work-card.soon { cursor:default; }
    .work-img { overflow:hidden; border:1px solid rgba(200,168,130,.1); height:360px; position:relative; }
    .work-img img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .6s cubic-bezier(.25,.46,.45,.94); }
    .work-card:hover .work-img img { transform:scale(1.04); }
    .work-cover { width:100%; height:100%; }
    .soon-tag { position:absolute; top:1rem; left:1rem; font-size:.52rem; letter-spacing:.28em; color:var(--sand); border:1px solid rgba(200,168,130,.4); padding:.32rem .7rem; background:rgba(13,9,6,.55); }
    .work-caption { text-align:center; padding:1.4rem 1rem .4rem; }
    .work-title { font-family:'Cormorant Garamond',serif; font-size:1.7rem; font-weight:300; letter-spacing:.04em; }
    .work-view { font-size:.58rem; letter-spacing:.3em; color:var(--sand); margin-top:.6rem; opacity:.85; transition:opacity .2s; }
    .work-card:hover .work-view { opacity:1; }
    .work-soon-label { font-size:.56rem; letter-spacing:.28em; opacity:.4; margin-top:.6rem; }

    /* arrows (desktop) */
    .works-arrow { position:absolute; top:160px; z-index:5; width:46px; height:46px; border-radius:50%; border:1px solid rgba(200,168,130,.3); background:rgba(19,15,12,.8); color:var(--cream); font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s,opacity .2s; }
    .works-arrow:hover { background:rgba(200,168,130,.15); }
    .works-arrow.l { left:.4rem; } .works-arrow.r { right:.4rem; }
    @media(max-width:900px){
      .works-arrow { width:38px; height:38px; font-size:1.1rem; top:130px; }
      .works-arrow.l { left:.2rem; } .works-arrow.r { right:.2rem; }
    }

    /* Swipe hint */
    .swipe-hint {
